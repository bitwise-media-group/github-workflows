# This repo's own release, dogfooding the reusable release workflow by local path.
# With no .goreleaser.yaml it takes the publish branch: release-please cuts the
# release (release-type: simple), `make build` is a no-op, and vanity-tags moves
# the floating v1 / v1.1 tags that consumers of these reusable workflows pin.
name: Release

on:
  push:
    branches: [main]

# release-please needs issues + pull-requests; the publish job moves the vanity
# tags with contents:write. No .goreleaser.yaml here, so the reusable workflow's
# goreleaser job is skipped and its id-token/attestations are not granted.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    uses: ./.github/workflows/release.yaml
    with:
      vanity-tags: true
