# This repo's own CI, dogfooding the reusable ci workflow by local path (so it
# always runs the current definition, not a release pin). The library has no root
# go.mod and no committed dist/ -- just a package.json for the prose toolchain --
# so the reusable workflow sets up node only and runs the canonical Makefile gates:
# lint (prettier --check + markdownlint), with build and test as no-ops here.
name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main", "releases/*"]

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
