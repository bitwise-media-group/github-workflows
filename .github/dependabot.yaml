# Keep the SHA-pinned actions in the reusable workflows fresh, and the pinned npm
# dev-tooling (prettier, markdownlint-cli2) that `make fmt`/`make lint` run up to date.
# github-actions bumps reach consumers, so they ship as `deps` and cut a release; the npm
# dev-tools are local-only, so they ship as `build` (release-please-ignored) and never do.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: deps
      prefix-development: build
      include: scope
    cooldown:
      default-days: 7
      # our own actions ship straight through — no cooldown wait
      exclude:
        - bitwise-media-group/*
    groups:
      actions:
        patterns:
          - actions/*
      github:
        patterns:
          - github/*
      bitwise-media-group:
        patterns:
          - bitwise-media-group/*
      codecov:
        patterns:
          - codecov/*
      google:
        patterns:
          - google/*
          - googleapis/*
      goreleaser:
        patterns:
          - goreleaser/*

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # local dev tooling only — `build` is release-please-ignored so these never cut a
      # library release (see the commit-type rules in AGENTS.md)
      prefix: build
      prefix-development: build
      include: scope
    cooldown:
      default-days: 7
    groups:
      dev-tooling:
        patterns:
          - "*"
